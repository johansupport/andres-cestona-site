<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceder — Andrés Cestona</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --black: #05070f; --dark: #1a1a2e; --mid: #555;
      --muted: #999; --border: #e8e8e8; --bg: #fff; --bg2: #f7f7f5;
      --gold: #c9a84c; --gold2: #e8c97a; --green: #16a34a; --red: #dc2626;
    }
    body { font-family:'Inter',sans-serif; background:var(--black); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }

    /* NAV */
    nav { height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 4%; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
    .nav-logo { font-size:.9rem; font-weight:800; color:#fff; text-decoration:none; }
    .nav-logo span { color:var(--gold); }
    .nav-back { font-size:.78rem; color:rgba(255,255,255,.4); text-decoration:none; transition:color .2s; }
    .nav-back:hover { color:#fff; }

    /* MAIN */
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1rem; }
    .auth-card {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08);
      border-radius:20px; padding:2.8rem 2.5rem; width:100%; max-width:420px;
    }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo-initials { width:56px; height:56px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:900; color:var(--black); margin:0 auto .9rem; }
    .auth-logo h1 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:#fff; letter-spacing:-.5px; }
    .auth-logo p { font-size:.75rem; color:rgba(255,255,255,.35); margin-top:.3rem; }

    /* TABS */
    .auth-tabs { display:flex; gap:0; margin-bottom:2rem; background:rgba(255,255,255,.04); border-radius:10px; padding:.25rem; border:1px solid rgba(255,255,255,.06); }
    .tab-btn { flex:1; padding:.55rem; border-radius:7px; border:none; background:transparent; color:rgba(255,255,255,.4); font-size:.8rem; font-weight:600; cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; }
    .tab-btn.active { background:rgba(255,255,255,.08); color:#fff; }

    /* FORM */
    .auth-form { display:flex; flex-direction:column; gap:1rem; }
    .field { display:flex; flex-direction:column; gap:.4rem; }
    .field label { font-size:.68rem; font-weight:600; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:1px; }
    .field input {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:9px; padding:.75rem 1rem; color:#fff; font-size:.88rem;
      font-family:'Inter',sans-serif; outline:none; transition:border-color .2s;
    }
    .field input:focus { border-color:var(--gold); }
    .field input::placeholder { color:rgba(255,255,255,.2); }
    .btn-submit {
      background:var(--gold); color:var(--black); padding:.8rem; border-radius:9px;
      border:none; font-size:.88rem; font-weight:700; cursor:pointer;
      font-family:'Inter',sans-serif; transition:background .2s, transform .15s;
      margin-top:.5rem;
    }
    .btn-submit:hover { background:var(--gold2); transform:translateY(-1px); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* MESSAGES */
    .msg { display:none; padding:.8rem 1rem; border-radius:8px; font-size:.8rem; margin-top:.5rem; }
    .msg.error { background:rgba(220,38,38,.12); border:1px solid rgba(220,38,38,.25); color:#fca5a5; display:block; }
    .msg.success { background:rgba(22,163,74,.1); border:1px solid rgba(22,163,74,.2); color:#86efac; display:block; }

    /* DIVIDER */
    .auth-divider { display:flex; align-items:center; gap:.8rem; margin:.3rem 0; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.07); }
    .auth-divider span { font-size:.68rem; color:rgba(255,255,255,.2); }

    /* FORGOT */
    .auth-forgot { text-align:center; margin-top:.8rem; }
    .auth-forgot a { font-size:.73rem; color:rgba(255,255,255,.3); text-decoration:none; transition:color .2s; }
    .auth-forgot a:hover { color:var(--gold); }

    /* FOOTER */
    footer { text-align:center; padding:1.5rem; border-top:1px solid rgba(255,255,255,.05); }
    footer p { font-size:.68rem; color:rgba(255,255,255,.2); }

    /* SPINNER */
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(0,0,0,.2); border-top-color:var(--black); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:.4rem; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Andrés <span>Cestona</span></a>
    <a href="index.html" class="nav-back">← Volver al inicio</a>
  </nav>

  <main>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-initials">AC</div>
        <h1>Andrés Cestona</h1>
        <p>Zona privada de inversores</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" required/>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-submit" id="btn-login">Entrar</button>
        <div class="msg" id="login-msg"></div>
        <div class="auth-forgot"><a href="#" onclick="handleForgot(event)">¿Olvidaste tu contraseña?</a></div>
      </form>

      <!-- REGISTER -->
      <form class="auth-form" id="form-register" style="display:none" onsubmit="handleRegister(event)">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="reg-name" placeholder="Tu nombre" required/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="tu@email.com" required/>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" minlength="8" required/>
        </div>
        <button type="submit" class="btn-submit" id="btn-register">Crear cuenta</button>
        <div class="msg" id="register-msg"></div>
      </form>
    </div>
  </main>

  <footer><p>&copy; 2026 Andrés Cestona. Todos los derechos reservados.</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://uhjxybyzpqksyysifatn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_PWj-sZtE5epSdFbvcZmI2g_pYIxUXaP';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Manejar callback de verificación de email (token en la URL)
    sb.auth.onAuthStateChange((event, session) => {
      if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
        location.href = 'dashboard.html';
      }
    });

    // Si ya está logueado, redirigir al dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data.session) location.href = 'dashboard.html';
    });

    function switchTab(tab) {
      document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Cargando...' : btn.dataset.label;
    }

    document.getElementById('btn-login').dataset.label = 'Entrar';
    document.getElementById('btn-register').dataset.label = 'Crear cuenta';

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleLogin(e) {
      e.preventDefault();
      setLoading('btn-login', true);
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) {
        showMsg('login-msg', traducirError(error.message), 'error');
        setLoading('btn-login', false);
      } else {
        showMsg('login-msg', '¡Bienvenido! Redirigiendo...', 'success');
        setTimeout(() => location.href = 'dashboard.html', 800);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      setLoading('btn-register', true);
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const pass = document.getElementById('reg-pass').value;
      const { error } = await sb.auth.signUp({
        email, password: pass,
        options: { data: { nombre: name } }
      });
      if (error) {
        showMsg('register-msg', traducirError(error.message), 'error');
        setLoading('btn-register', false);
      } else {
        showMsg('register-msg', '¡Cuenta creada! Revisa tu email para confirmar.', 'success');
        setLoading('btn-register', false);
      }
    }

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      if (!email) { showMsg('login-msg', 'Ingresa tu email primero.', 'error'); return; }
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: location.origin + '/auth.html'
      });
      if (error) showMsg('login-msg', traducirError(error.message), 'error');
      else showMsg('login-msg', 'Te enviamos un email para restablecer tu contraseña.', 'success');
    }

    function traducirError(msg) {
      if (msg.includes('Invalid login')) return 'Email o contraseña incorrectos.';
      if (msg.includes('Email not confirmed')) return 'Debes confirmar tu email primero.';
      if (msg.includes('already registered')) return 'Este email ya está registrado.';
      if (msg.includes('Password should')) return 'La contraseña debe tener al menos 8 caracteres.';
      return msg;
    }
  </script>
</body>
</html>
